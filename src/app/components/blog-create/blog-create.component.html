<div class="create-blog-container">
  <div class="create-blog-card">

    <h2>Create Blog</h2>

    <form (ngSubmit)="submit()" #createForm="ngForm">

      <div class="form-group">
        <label>Blog Title</label>
        <input
          type="text"
          [(ngModel)]="blog.name"
          name="name"
          required
          placeholder="Enter blog title"
          required  
        />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          rows="4"
          [(ngModel)]="blog.description"
          name="description"
          placeholder="Enter blog description"
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label>Author</label>
        <input
          type="text"
          [(ngModel)]="blog.author"
          name="author"
          placeholder="Author name"
            required
        />
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input
          type="text"
          [(ngModel)]="blog.imageUrl"
          name="imageUrl"
          placeholder="https://example.com/image.jpg"
          required
        />
        <!-- 🔥 Backend validation message -->
        <div class="field-error" *ngIf="imageUrlError">
            {{ imageUrlError }}
        </div>
      </div>

      <button type="submit" [disabled]="createForm.invalid || loading">
  {{ loading ? 'Creating...' : 'Create Blog' }}
</button>

    </form>

  </div>
</div>
