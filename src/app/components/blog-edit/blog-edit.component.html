<div class="edit-blog-container">
  <div class="edit-blog-card">

    <h2>Edit Blog</h2>

    <form *ngIf="blog" (ngSubmit)="update()" #editForm="ngForm">

      <div class="form-group">
        <label>Blog Title</label>
        <input
          type="text"
          [(ngModel)]="blog.name"
          name="name"
          required
          placeholder="Enter blog title"
        />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          rows="4"
          [(ngModel)]="blog.description"
          name="description"
          placeholder="Enter blog description"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Author</label>
        <input
          type="text"
          [(ngModel)]="blog.author"
          name="author"
          placeholder="Author name"
        />
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input
          type="text"
          [(ngModel)]="blog.imageUrl"
          name="imageUrl"
          placeholder="https://example.com/image.jpg"
        />
      </div>

      <button type="submit" [disabled]="editForm.invalid || loading">
  {{ loading ? 'Updating...' : 'Update Blog' }}
</button>

    </form>

  </div>
</div>
