<div class="edit-blog-container">

  <mat-card class="edit-blog-card">

    <h2>Edit Blog</h2>

    <form *ngIf="blog" (ngSubmit)="update()" #editForm="ngForm">

      <!-- Blog Title -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Blog Title</mat-label>

        <input
          matInput
          [(ngModel)]="blog.name"
          name="name"
          required
          placeholder="Enter blog title"
        />

        <mat-error *ngIf="editForm.controls['name']?.invalid">
          Title is required
        </mat-error>

      </mat-form-field>


      <!-- Description -->
      <mat-form-field appearance="outline" class="full-width">

        <mat-label>Description</mat-label>

        <textarea
          matInput
          rows="4"
          [(ngModel)]="blog.description"
          name="description"
          required
          placeholder="Enter blog description"
        ></textarea>

        <mat-error *ngIf="editForm.controls['description']?.invalid">
          Description is required
        </mat-error>

      </mat-form-field>


      <!-- Author -->
      <mat-form-field appearance="outline" class="full-width">

        <mat-label>Author</mat-label>

        <input
          matInput
          [(ngModel)]="blog.author"
          name="author"
          required
          placeholder="Author name"
        />

        <mat-error *ngIf="editForm.controls['author']?.invalid">
          Author is required
        </mat-error>

      </mat-form-field>


      <!-- Image URL -->
      <mat-form-field appearance="outline" class="full-width">

        <mat-label>Image URL</mat-label>

        <input
          matInput
          [(ngModel)]="blog.imageUrl"
          name="imageUrl"
          required
          placeholder="https://example.com/image.jpg"
        />

        <mat-error *ngIf="editForm.controls['imageUrl']?.invalid">
          Image URL is required
        </mat-error>

      </mat-form-field>


      <!-- Backend validation error -->
      <div class="field-error" *ngIf="imageUrlError">
        {{ imageUrlError }}
      </div>


      <!-- Update Button -->
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="editForm.invalid || loading"
      >

        {{ loading ? 'Updating...' : 'Update Blog' }}

      </button>

    </form>

  </mat-card>

</div>
