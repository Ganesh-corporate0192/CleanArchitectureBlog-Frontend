<div class="blog-list-container">

  <div class="header">
    <h2>Blog List</h2>
    <a class="create-btn" routerLink="/create">+ Create Blog</a>
  </div>

  <div class="blog-card" *ngFor="let blog of blogs">

    <div class="blog-content">
      <h3>{{ blog.name }}</h3>

      <p class="description">
        {{ blog.description }}
      </p>

      <p class="author">
        <strong>Author:</strong> {{ blog.author }}
      </p>
    </div>

    <div class="blog-image" *ngIf="blog.imageUrl">
      <img [src]="blog.imageUrl" alt="Blog image" />
    </div>

    <div class="actions">
      <a class="edit-btn" [routerLink]="['/edit', blog.id]">Edit</a>
      <button class="delete-btn" (click)="delete(blog.id!)">
  Delete
</button>
    </div>

  </div>

</div>
